<!DOCTYPE html>
<html>
<head>
    <title>AI Agent</title>
</head>
<body>

<h1>AI Agent 🔥</h1>

<textarea id="input" rows="10" cols="50" placeholder="Wklej kod tutaj..."></textarea>
<br><br>

<button onclick="send()">Analyze</button>

<pre id="output"></pre>

<script>
async function send() {
    const code = document.getElementById("input").value;

    try {
        const res = await fetch("https://agent-pr.onrender.com/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ code: code })
        });

        const data = await res.json();

        document.getElementById("output").innerText = data.review;

    } catch (err) {
        console.error(err);
        alert("Error connecting to backend");
    }
}
</script>

</body>
</html>
