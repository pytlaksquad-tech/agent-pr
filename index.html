<!DOCTYPE html>
<html>
<head>
    <title>AI Agent</title>
</head>
<body>

<h1>🔥AI agent PR VISA 🔥</h1>

<textarea id="input" placeholder="Wklej kod tutaj..." rows="10" cols="50"></textarea>
<br><br>

<button onclick="send()">Analyze</button>

<pre id="output"></pre>

<script>
async function send() {
    const res = await fetch("https://agent-pr.onrender.com/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            code: document.getElementById("input").value
        })
    });

    const data = await res.json();
    document.getElementById("output").innerText = data.review;
}
</script>

</body>
</html>
