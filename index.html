<!DOCTYPE html>
<html>
<head>
    <title>AI Agent</title>
    <style>
        body {
            font-family: Arial;
            padding: 40px;
        }

        textarea {
            width: 500px;
            height: 150px;
        }

        input {
            width: 500px;
            padding: 8px;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            margin-right: 10px;
        }

        pre {
            background: #111;
            color: #0f0;
            padding: 15px;
            margin-top: 20px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h1>AI Agent 🔥</h1>

<!-- ================= CODE REVIEW ================= -->

<h3>Code review</h3>
<textarea id="input" placeholder="Wklej kod tutaj..."></textarea>
<br><br>
<button onclick="send()">Analyze Code</button>

<br><br><hr><br>

<!-- ================= GOOGLE DRIVE ================= -->

<h3>Google Drive folder chat</h3>

<input id="folder" placeholder="Google Drive Folder ID">
<br><br>

<input id="question" placeholder="Zadaj pytanie o pliki...">
<br><br>

<button onclick="ask()">Ask Folder</button>

<!-- ================= OUTPUT ================= -->

<pre id="output">Wynik pojawi się tutaj...</pre>

<!-- ================= SCRIPT ================= -->

<script>

async function send() {
    const code = document.getElementById("input").value;

    document.getElementById("output").innerText = "Loading...";

    try {
        const res = await fetch("https://agent-pr.onrender.com/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code
            })
        });

        const data = await res.json();

        console.log("ANALYZE:", data);

        document.getElementById("output").innerText =
            data.review || JSON.stringify(data, null, 2);

    } catch (err) {
        document.getElementById("output").innerText = "ERROR: " + err.message;
    }
}


async function ask() {
    const folder = document.getElementById("folder").value;
    const question = document.getElementById("question").value;

    document.getElementById("output").innerText = "Loading AI...";

    try {
        const res = await fetch("https://agent-pr.onrender.com/chat-folder", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                folder_id: folder,
                question: question
            })
        });

        const data = await res.json();

        console.log("FOLDER:", data);

        document.getElementById("output").innerText =
            data.answer || data.review || JSON.stringify(data, null, 2);

    } catch (err) {
        document.getElementById("output").innerText = "ERROR: " + err.message;
    }
}

</script>

</body>
</html>
